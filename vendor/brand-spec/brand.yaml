# brand-spec — Brand Definition Contract
#
# Schema describing the file/folder layout and frontmatter conventions a
# brand repo MUST (required), SHOULD (recommended), or MAY (optional)
# provide so it can be ingested by AI agents and downstream tools (e.g.,
# grāmatr Studio).
#
# This file is the source of truth for "what makes a brand definition
# valid." It was reverse-engineered from the first concrete brand repo
# that adopted the conventions; values listed under any `_observed`
# fields are illustrative, not prescriptive. See README.md for usage,
# scaffolding guidance, and how brands map their content into the
# abstract slots defined here.

schema_version: 1
contract_name: gramatr.brand
contract_version: 1.2.1

# -----------------------------------------------------------------------------
# Cross-cutting conventions
# -----------------------------------------------------------------------------

conventions:
  file_format: markdown        # all content files are .md with optional YAML frontmatter
  data_format: yaml            # files under data/ are pure YAML
  frontmatter:
    syntax: yaml               # delimited by --- ... ---
    presence: optional         # files MAY omit frontmatter; if present, must parse
    common_fields:             # fields observed across multiple file types
      version:
        type: string
        notes: "semver or simple decimal (e.g., '1.0', '1.0.0'); used for change tracking"
      brand:
        type: string
        notes: "brand name; redundant with identity.name but useful for standalone files"
      last_updated:
        type: string
        notes: "ISO date 'YYYY-MM-DD'; alias 'updated' is also acceptable"
      status:
        type: string
        enum: [draft, active, canonical, open, archived, sample]
        notes: |
          Lifecycle marker. 'open' = known-incomplete spec. 'sample' =
          template/example file shipped as scaffolding (e.g., contents
          of templates/empty-brand/); validators MAY skip strict value
          validation for files marked `status: sample`, so placeholder
          values like `slug: TODO-kebab-case-slug` or `perspective: TODO`
          are tolerated. Real brand content MUST NOT use `status: sample`.
      visibility:
        type: string
        enum: [public, customer, internal, sales-enablement]
        required: false
        notes: |
          (v1.2) Optional file-level visibility classification. Default
          when omitted is `public`. Consuming-tool contract:
            - `public`           — safe in public-facing generation,
                                   websites, marketing.
            - `customer`         — share with customers but not on public
                                   surfaces (e.g., onboarding decks).
            - `internal`         — internal use only; never include in
                                   public/customer-facing generation.
            - `sales-enablement` — internal sales-only; agents generating
                                   customer-facing content MUST NOT
                                   include.
          Tools that generate public artifacts (Studio public renderers,
          website builders, AI agents producing marketing copy) MUST
          filter out anything with `visibility` ≠ `public`. Tools
          generating internal artifacts MAY include all.

          Backward compatibility: if a v1.1 file uses `audience: internal`
          (observed historically on `proof/competitive.md`), validators
          SHOULD treat it as `visibility: internal` and emit a warning
          recommending migration to the `visibility` field.
      source_authority:
        type: object
        required: false
        notes: |
          (v1.2) Optional declaration of this file's authority relative
          to other sources of the same brand fact. Default when omitted
          is `status: canonical`.
        properties:
          status:
            type: string
            enum: [canonical, mirror, historical, fixture-only]
            required: true
            notes: |
              - `canonical`     — this file is the source of truth.
              - `mirror`        — this file mirrors `upstream`; do not
                                  edit here, edit upstream. Validators
                                  MAY compare against upstream.
              - `historical`    — represents an earlier brand state, kept
                                  for reference only; ignore for current
                                  brand decisions.
              - `fixture-only`  — exists for test/demo purposes and
                                  intentionally diverges from canonical;
                                  ignore for brand decisions.
          upstream:
            type: string
            required_when: "status in [mirror, historical]"
            notes: "path or URL to the upstream/canonical source."
          notes:
            type: string
            required_when: "status in [historical, fixture-only]"
            notes: "free-text — explain why this non-canonical file exists."
          refresh:
            type: object
            required: false
            notes: |
              Only meaningful when `status: mirror`. Declares how the
              mirror is kept current.
            properties:
              cadence:
                type: string
                enum: [manual, on-deploy, weekly, monthly, on-source-change]
                required: true
              last_synced:
                type: string
                format: date
                required: true
                notes: "YYYY-MM-DD; when the mirror was last reconciled with upstream."
              sync_method:
                type: string
                required: false
                notes: "free-text — how the mirror is kept current (script, manual copy, build step, etc.)."
  file_naming:
    case: kebab-case
    patterns:
      messaging_audience: "messaging/for-{audience}.md"
      messaging_channel: "messaging/channel-{channel}.md"
      persona: "personas/{audience}-{role}.md"
      persona_archive: "personas/_archive/{slug}.md"
      framework_doc: "personas/_framework.md"   # underscore prefix = framework/meta, not a persona
      data_file: "data/{topic}.yaml"
      example: "examples/{content-type}-{slug}.md"
      prompt: "prompts/{content-type}.md"
      ui_token: "ui-tokens/{layer}.md"
  reserved_prefixes:
    underscore: "files/dirs starting with _ are framework, archive, or manifest — not content instances"

# -----------------------------------------------------------------------------
# Layers
# -----------------------------------------------------------------------------
# Each layer is required | recommended | optional.
#   required    — Conforming consumers refuse to ingest without it.
#   recommended — Consumers ingest but degrade (warns; some downstream
#                 features unavailable).
#   optional    — Purely additive.

layers:

  # --- AGENT CONTEXT ----------------------------------------------------
  agent_context:
    required: false
    recommended: true
    description: |
      A compressed, AI-agent-facing summary of the brand. Acts as the
      "brand's CLAUDE.md" — the entry point for context-constrained
      agents that cannot or should not load every layer up front. Small
      brands MAY skip this; larger brands benefit from a curated digest
      that fits in a single prompt window.
    files:
      - path: agent-context.md
        required: false
        recommended: true
        frontmatter:
          schema_version:   { type: integer, required: true,  notes: "matches brand-spec schema_version this file targets" }
          summary:          { type: string,  required: true,  notes: "1-paragraph human description of the brand" }
          priority_layers:  { type: array,   required: true,  items: { type: string }, notes: "ordered list of layers an agent should load first if context is constrained" }
        body_sections_recommended:
          - "Voice (one paragraph)"
          - "Top 5 vocabulary do/don't"
          - "Persona summary"
          - "Anything else essential"
        notes: |
          Target body size ≈ 2-4K tokens. The goal is "one prompt window
          gives an agent enough to write on-brand without loading the
          full repo." When the agent has more budget, it SHOULD load
          the layers named in `priority_layers` next.

  # --- IDENTITY ----------------------------------------------------------
  identity:
    required: true
    description: "Who the brand is. The single most-load-bearing file in the repo."
    files:
      - path: identity.md
        required: true
        frontmatter:
          slug:        { type: string, required: true,  notes: "kebab-case repo identifier" }
          name:        { type: string, required: true,  notes: "display name" }
          legal_name:  { type: string, required: false }
          tagline:     { type: string, required: true }
          industry:    { type: string, required: false }
          website:     { type: string, required: false, format: url }
          domains:     { type: array,  required: false, items: { type: string } }
          founded:     { type: integer, required: false }
          org:         { type: string, required: false, notes: "e.g., GitHub org slug" }
        body_sections_recommended:
          - Positioning
          - "Elevator Pitch"
          - One-liner
          - Mission
          - Founders
          - "What {Brand} Is Not"
          - "Proprietary Concepts"

  # --- VOICE -------------------------------------------------------------
  voice:
    required: true
    description: |
      How the brand sounds. Voice attributes, tone rules, what it is NOT.

      (v1.2) A brand MAY use ONE of two patterns — never both:

      1. Single-register (v1.1, default): a `voice.md` file at the brand
         root. Use this when one voice is canonical for all contexts.

      2. Multi-register (v1.2): a `voice/` directory containing
         `voice/registers/{register-slug}.md` per register, plus a
         `voice/README.md` (or `voice/_index.md`) that lists registers and
         documents when each applies. Use this when a brand has multiple
         distinct on-brand voices that vary by channel or context (e.g.,
         corporate marketing voice vs. engineering/agent voice vs. founder
         byline voice — all on-brand, contextually distinct).

      Mixing the two patterns within a single brand is invalid (see
      `voice-pattern-exclusive` validation rule).
    files:
      - path: voice.md
        required: false
        recommended: true
        notes: |
          Required when the brand uses the single-register pattern.
          MUST NOT exist when the brand uses the multi-register pattern.
        frontmatter:
          default_tone:   { type: string, required: false, notes: "e.g., 'confident-direct'" }
          reading_level:  { type: string, required: false, notes: "e.g., 'professional'" }
          perspective:    { type: string, required: false, enum: [first-person, second-person, third-person] }
        body_sections_recommended:
          - "Core Characterization"
          - "Voice Attributes"
          - "What the Voice Is NOT"
          - "Tone Rules"
          - "Published Voice Examples"
    directories:
      - path: voice/
        required: false
        notes: |
          (v1.2) Multi-register voice directory. When present, `voice.md`
          at the root MUST NOT exist.
        contents:
          - path: README.md
            required: false
            notes: |
              Required (as either `README.md` or `_index.md`) when the
              `voice/` directory exists. Lists the registers and
              documents when each applies (channel/context coverage,
              precedence rules when multiple could apply).
          - path: _index.md
            required: false
            notes: "Alternative to README.md; same purpose."
          - pattern: "registers/{register-slug}.md"
            required: false
            min_files: 1
            notes: |
              At least one register file MUST exist when the multi-register
              pattern is used.
            frontmatter:
              register:    { type: string, required: true, notes: "register slug; matches filename" }
              applies_to:
                type: array
                required: true
                items: { type: string }
                notes: |
                  Channels/contexts where this register is canonical
                  (e.g., `[website, blog, marketing-emails]` for
                  corporate; `[code-comments, agent-prompts, technical-docs]`
                  for engineering).
              default_tone:   { type: string, required: false, notes: "e.g., 'confident-direct'" }
              reading_level:  { type: string, required: false, notes: "e.g., 'professional'" }
              perspective:    { type: string, required: false, enum: [first-person, second-person, third-person] }
            body_sections_recommended:
              - "Core Characterization"
              - "Voice Attributes"
              - "What the Voice Is NOT"
              - "Tone Rules"
              - "Published Voice Examples"

  # --- VOCABULARY --------------------------------------------------------
  vocabulary:
    required: true
    description: "Preferred terms, forbidden terms, glossary. Drives lint at generation time."
    files:
      - path: vocabulary.md
        required: true
        frontmatter: {}        # observed empty; reserved for future fields
        body_sections_recommended:
          - "Preferred Terms"
          - "Forbidden Terms"
          - "Glossary"

  # --- DESIGN TOKENS -----------------------------------------------------
  design:
    required: true
    description: "Visual system: colors, typography, modes, logo references."
    files:
      - path: design-tokens.md
        required: true
        frontmatter:
          mode:          { type: string, required: false, notes: "e.g., 'dark-primary' | 'light-primary' | 'mixed'" }
          design_system: { type: string, required: false, notes: "e.g., the upstream design system the brand extends" }
        body_sections_recommended:
          - "Visual Mode"
          - Colors
          - Typography
          - Email
          - Logos
    directories:
      - path: assets/
        required: true
        notes: |
          (v1.2.1) Format preference convention — recommended, not enforced
          by the validator. PNG (or other raster) is accepted for any logo
          file; SVG is preferred for future additions or replacements when
          vector source becomes available. SVG matters when scaling beyond
          native resolution (signage, full-bleed slide titles, large-format
          print), recoloring programmatically, or doing vector ops in
          design tools. PNG remains the right choice for email (SVG support
          is patchy in Outlook), social profile/cover images, and any
          context bounded to native resolution. Brands MUST NOT auto-trace
          PNG to SVG for typographic wordmarks — tracing produces noisy
          polygons that fail to match optical kerning. Tracing is
          appropriate for high-contrast geometric marks only. See
          `templates/empty-brand/assets/_manifest.md` for the canonical
          framing brands SHOULD adopt verbatim.
        contents:
          - { path: _manifest.md, required: true,  notes: "approved asset registry with usage context; (v1.2.1) MAY include the optional `wordmark:` frontmatter block — see below" }
          - { glob: "*.svg",      required: false, notes: "logo and brand mark vectors (preferred for future additions)" }
          - { glob: "*.png|*.jpg", required: false, notes: "raster logo and brand mark exports (accepted; right choice for email, social profile/cover, native-resolution surfaces)" }
        manifest_frontmatter:
          wordmark:
            type: object
            required: false
            notes: |
              (v1.2.1) Optional wordmark metadata block on
              `assets/_manifest.md`. When present, captures the canonical
              glyph sequence, typeface, and ASCII fallback for the brand's
              wordmark so AI agents and downstream tools can render it
              correctly. When absent (icon-only brands, or brands without
              a wordmark), nothing changes — this is purely additive.

              Precedence rule: `text` is the canonical form and SHOULD be
              used wherever the consuming surface can render it.
              `text_ascii` is the fallback ONLY when the surface cannot
              render the canonical glyphs (CLI, URLs, npm package names,
              social handles that reject non-ASCII). Tools MUST NOT
              substitute `text_ascii` when the canonical works.
            properties:
              text:
                type: string
                required_when: "wordmark block is present"
                notes: "canonical glyph sequence as it appears in the logo (e.g., 'grāmatr')"
              text_ascii:
                type: string
                required_when: "`text` contains non-ASCII characters"
                notes: |
                  ASCII fallback for contexts that cannot render the
                  canonical glyphs (CLI, URLs, package names, social
                  handles where non-ASCII is rejected). When `text` is
                  pure ASCII, this field MAY be omitted (or set equal to
                  `text` for consumer-side simplicity).
              typeface:
                type: string
                required: false
                notes: "font family the wordmark is set in (e.g., 'Outfit')"
              weight:
                type: integer
                required: false
                notes: "numeric font weight (e.g., 400, 600, 700)"
              case:
                type: string
                required: false
                enum: [lowercase, uppercase, titlecase, mixed]
                notes: "case treatment of the canonical wordmark"
              glyph_notes:
                type: string
                required: false
                notes: |
                  Human/agent-readable notes on special characters,
                  diacritics, ligatures, or any non-obvious glyph that
                  affects rendering or fallback. Particularly important
                  when `text` contains non-ASCII characters — explain
                  what carries meaning and when the ASCII fallback
                  applies. When the brand also documents a two-spelling
                  rule in `vocabulary.md`, cross-reference it here.
      - path: fonts/
        required: false
        notes: "self-hosted typeface files; license file (e.g., OFL-*.txt) MUST accompany"

  # --- UI TOKENS (three-layer system) ------------------------------------
  ui_tokens:
    required: false
    recommended: true
    description: |
      Three-layer token system (primitive → semantic → component) plus
      mode and motion overlays. Required when the brand drives application
      UI; optional for marketing-only brands.
    directories:
      - path: ui-tokens/
        contents:
          - path: primitives.md
            required: false
            frontmatter:
              layer:   { type: string, required: true, const: primitive }
              version: { type: string, required: false }
          - path: semantic.md
            required: false
            frontmatter:
              layer:      { type: string, required: true, const: semantic }
              depends-on:
                type: array
                required: false
                items: { type: string }
                notes: |
                  List of parent ui-tokens layer files this layer
                  depends on. Semantic SHOULD reference
                  `primitives.md`. A layer MAY depend on multiple
                  parent layers (e.g., a component layer depending on
                  both `semantic.md` and `motion.md`).
          - path: component.md
            required: false
            frontmatter:
              layer:      { type: string, required: true, const: component }
              depends-on:
                type: array
                required: false
                items: { type: string }
                notes: |
                  List of parent ui-tokens layers. Components SHOULD
                  depend on `semantic.md` (and MAY also depend on
                  `motion.md`, `dark-mode.md`, etc.).
          - path: dark-mode.md
            required: false
            frontmatter:
              layer:      { type: string, required: true, const: dark-mode }
              depends-on:
                type: array
                required: false
                items: { type: string }
                notes: "List of parent layers (typically `semantic.md`)."
          - path: motion.md
            required: false
            frontmatter:
              layer:   { type: string, required: true, const: motion }

  # --- MESSAGING ---------------------------------------------------------
  messaging:
    required: true
    description: |
      Two parallel families:
      (a) audience-targeted messaging — one file per audience segment
      (b) channel guides — one file per delivery channel
    directories:
      - path: messaging/
        contents:
          - pattern: "for-{audience}.md"
            required: true
            min_files: 1
            frontmatter:
              audience:        { type: string, required: true,  notes: "audience slug; brand-defined taxonomy" }
              headline:        { type: string, required: true }
              description:     { type: string, required: true }
              pain_point:      { type: string, required: true }
              desired_outcome: { type: string, required: true }
            notes: |
              The `audience` value is brand-defined. A B2B SaaS brand
              might use enterprise/mid-market/smb; a deal-cycle-focused
              brand might use champion/buyer/end-user; a CPG brand might
              use a demographic taxonomy. The pattern is universal; the
              taxonomy is not.
          - pattern: "channel-{channel}.md"
            required: false
            recommended: true
            min_files: 1
            frontmatter:
              channel:         { type: string, required: true, notes: "channel slug" }
              brand:           { type: string, required: false }
              version:         { type: string, required: false }
              last_updated:    { type: string, required: false }
              status:          { type: string, required: false }
              format:          { type: string, required: false, notes: "e.g., 'print/pdf'" }
              primary_platform: { type: string, required: false, notes: "e.g., 'linkedin' for social" }
              formats:         { type: array,  required: false, items: { type: string } }
            notes: |
              Channel slugs are brand-defined (e.g., deck, email,
              landing-page, one-pager, social, webinar, podcast,
              direct-mail). One file per channel the brand actively
              publishes through.

  # --- PERSONAS ----------------------------------------------------------
  personas:
    required: false
    recommended: true
    description: |
      Detailed audience descriptions. Brands typically organize personas
      as a matrix of {audience} × {role} — for example, a 3×3 grid of
      three audience segments crossed with three buying-committee roles.
      The framework file documents the matrix shape; individual persona
      files are cells in it.
    directories:
      - path: personas/
        contents:
          - path: _framework.md
            required: false
            recommended: true
            frontmatter:
              type:    { type: string, required: true, const: framework }
              version: { type: string, required: false }
            notes: "Documents the persona matrix and the role archetype definitions."
          - pattern: "{audience}-{role}.md"
            required: false
            recommended: true
            frontmatter:
              id:       { type: string, required: true, notes: "matches filename slug" }
              role:     { type: string, required: true, notes: "role slug from brand's role taxonomy" }
              audience: { type: string, required: true, notes: "audience slug; SHOULD match a messaging/for-{audience}.md" }
              label:    { type: string, required: true, notes: "human-readable persona title" }
          - path: _archive/
            required: false
            notes: "deprecated personas; preserved for historical context but not ingested as live"

  # --- PROOF -------------------------------------------------------------
  proof:
    required: false
    recommended: true
    description: |
      Evidence library: proof points, competitive positioning, credentials.
      Distinct from the data/ layer — proof/ is curated narrative; data/
      is structured machine-readable.
    directories:
      - path: proof/
        contents:
          - path: proof-points.md
            required: false
            recommended: true
            frontmatter:
              type:         { type: string, required: false, const: proof-library }
              version:      { type: string, required: false }
              last_updated: { type: string, required: true, format: date, notes: "YYYY-MM-DD; proof claims go stale" }
          - path: competitive.md
            required: false
            frontmatter:
              type:         { type: string, required: false, const: competitive-positioning }
              visibility:   { type: string, required: false, notes: "(v1.2) typically 'sales-enablement'; see conventions.frontmatter.common_fields.visibility" }
              audience:     { type: string, required: false, notes: "DEPRECATED in v1.2 — use `visibility` instead. If `audience: internal` is present, validators treat it as `visibility: internal` and warn." }
              version:      { type: string, required: false }
              last_updated: { type: string, required: true, format: date, notes: "YYYY-MM-DD; competitive maps decay quickly" }

  # --- DATA --------------------------------------------------------------
  data:
    required: false
    recommended: true
    description: |
      Pure YAML files holding machine-readable claims, registries, and
      structured reference. Content generators pull from here so prose
      files don't drift from canonical numbers and definitions.
    directories:
      - path: data/
        contents:
          - glob: "*.yaml"
            required: false
            recommended: true
            notes: |
              Each file is a self-describing registry, scoped to one
              topic. Topic slugs are brand-defined (e.g., team/,
              market/, stats/, frameworks/). The pattern — one topic per
              file, comment header documenting the schema — is universal.
            file_header_convention: |
              Each YAML file SHOULD open with comment lines documenting
              its purpose, per-entry schema, confidence-level conventions,
              and last-updated date.

  # --- PRODUCT -----------------------------------------------------------
  product:
    required: false
    recommended: true
    description: |
      Mechanical truth about what the product/service is and how it works.
      One file per product or product-line. Single-product brands will
      have a single file; multi-product brands SHOULD use one file per
      product.
    directories:
      - path: product/
        contents:
          - pattern: "{product-slug}.md"
            required: false
            recommended: true
            min_files: 1
            frontmatter:
              title:        { type: string, required: true }
              version:      { type: string, required: false }
              source:       { type: string, required: false, notes: "where the canonical claims came from" }
              last_updated: { type: string, required: true, format: date, notes: "YYYY-MM-DD; product changes frequently — freshness signals trustworthiness" }
            body_sections_recommended:
              - "What it is"
              - "How it works"
              - "What's included"
              - "What's NOT included"
              - "Pricing"           # or "Pricing model"
              - "Integrations"
              - "Known limitations"
            notes: |
              Body sections are recommended, not required — different
              products have different shapes (e.g., a service-only
              brand has no `Integrations`; a free product has no
              `Pricing`). The list above is the structure that emerged
              from the first reverse-engineered brand and is a useful
              default.

  # --- EXAMPLES ----------------------------------------------------------
  examples:
    required: false
    recommended: true
    description: |
      Reference outputs that have been human-validated. Used as few-shot
      anchors by prompt templates and as regression checks when prompts
      or voice change.
    directories:
      - path: examples/
        contents:
          - pattern: "{content-type}-{slug}.md"
            required: false
            recommended: true
            frontmatter:
              example_type:     { type: string, required: true, notes: "e.g., 'one-pager', 'email-sequence'" }
              variant:          { type: string, required: false, notes: "e.g., 'vertical-specific'" }
              target_vertical:  { type: string, required: false }
              target_role:      { type: string, required: false }
              files_used:       { type: array,  required: false, items: { type: string }, notes: "brand files this example was generated from" }
              generated:        { type: string, required: false, format: date }
              status:           { type: string, required: false, notes: "e.g., 'reference — validated by human review'" }

  # --- PROMPTS -----------------------------------------------------------
  prompts:
    required: false
    recommended: true
    description: |
      Agent brief templates — one per content type. Each prompt names the
      brand files it expects to be attached and (when validated) the
      examples that anchor it. Content-type slugs are brand-defined
      (e.g., one-pager, email-sequence, deck-sales).
    directories:
      - path: prompts/
        contents:
          - pattern: "{content-type}.md"
            required: false
            recommended: true
            frontmatter:
              prompt_type:  { type: string, required: true, const: agent-brief-template }
              content_type: { type: string, required: true, notes: "matches the prompt's content-type slug" }
              version:      { type: string, required: false }
              validated:    { type: boolean, required: false, notes: "true when at least one example exists and passed human review" }
              examples:     { type: array,  required: false, items: { type: string }, notes: "paths to examples/ files that anchor this prompt" }

  # --- DESIGN SPECS ------------------------------------------------------
  design_specs:
    required: false
    description: |
      Open design questions and channel-specific asset specs that don't
      fit cleanly in design-tokens.md (which is canonical) or in a channel
      guide (which is copy-focused).
    directories:
      - path: design/
        contents:
          - glob: "*.md"
            required: false
            frontmatter:
              type:         { type: string, required: false, notes: "e.g., 'design-spec'" }
              status:       { type: string, required: false, notes: "'open' = work-in-progress; 'closed' = resolved" }
              area:         { type: string, required: false, notes: "e.g., 'social', 'email'" }
              last_updated: { type: string, required: true, format: date, notes: "YYYY-MM-DD; open design questions go stale and need re-review" }

  # --- META --------------------------------------------------------------
  meta:
    required: false
    description: "Repo-level meta files. Not ingested as brand content."
    files:
      - path: README.md
        required: true
        notes: "human-facing repo overview; SHOULD link to brand-spec"
      - path: HANDOFF.md
        required: false
        notes: "session handoff for human/agent collaborators"

# -----------------------------------------------------------------------------
# Validation rules (cross-layer)
# -----------------------------------------------------------------------------

validation:
  - id: identity-required
    rule: "identity.md MUST exist with frontmatter.slug and frontmatter.name"
  - id: voice-required
    rule: |
      The brand MUST provide a voice layer using exactly ONE of two
      patterns:
        (a) single-register: `voice.md` at the brand root, OR
        (b) multi-register (v1.2): a `voice/` directory containing at
            least one `voice/registers/{register-slug}.md` and a
            `voice/README.md` (or `voice/_index.md`).
  - id: voice-pattern-exclusive
    rule: |
      (v1.2) If `voice/` directory exists, `voice.md` at the brand root
      MUST NOT exist (and vice versa). Mixing patterns within a single
      brand is invalid.
  - id: voice-multi-register-index
    rule: |
      (v1.2) When the multi-register pattern is used, `voice/README.md`
      OR `voice/_index.md` MUST exist (exactly one). At least one file
      under `voice/registers/` MUST exist, and each MUST have
      frontmatter.register and frontmatter.applies_to populated.
  - id: source-authority-upstream-required
    rule: |
      (v1.2) If a file's `source_authority.status` is `mirror` or
      `historical`, `source_authority.upstream` MUST be present. When
      `upstream` is a path, the file MUST exist; when it is a URL, it
      MUST be well-formed.
  - id: source-authority-notes-required
    rule: |
      (v1.2) If a file's `source_authority.status` is `historical` or
      `fixture-only`, `source_authority.notes` MUST be present and
      non-empty.
  - id: source-authority-mirror-freshness-warn
    severity: warn
    rule: |
      (v1.2) If `source_authority.status: mirror` and
      `source_authority.refresh.last_synced` is older than the cadence
      implies (weekly cadence + last_synced > 14 days; monthly + > 60
      days; on-deploy/on-source-change/manual = no automatic warning),
      validators SHOULD warn that the mirror may be stale.
  - id: visibility-default-public
    rule: |
      (v1.2) If `visibility` is omitted, the file is treated as
      `visibility: public`. Tools generating public-facing artifacts
      MUST filter out files where `visibility` ≠ `public`.
  - id: visibility-audience-internal-backcompat
    severity: warn
    rule: |
      (v1.2) If a file uses the v1.1 `audience: internal` field on
      `proof/competitive.md`, validators SHOULD treat it as
      `visibility: internal` and warn, recommending migration to the
      new `visibility` field.
  - id: vocabulary-required
    rule: "vocabulary.md MUST exist (frontmatter MAY be empty)"
  - id: design-tokens-required
    rule: "design-tokens.md MUST exist; assets/ directory MUST exist with _manifest.md"
  - id: messaging-audience-min
    rule: "At least one messaging/for-{audience}.md MUST exist"
  - id: persona-audience-coverage
    rule: |
      For every persona file with frontmatter.audience = X, a
      messaging/for-X.md SHOULD exist. (Warning, not error.)
  - id: prompt-example-when-validated
    rule: |
      Any prompts/{x}.md with frontmatter.validated = true MUST list at
      least one path under examples in frontmatter.examples, and each
      listed example file MUST exist.
  - id: ui-tokens-layer-order
    rule: |
      If ui-tokens/semantic.md exists, ui-tokens/primitives.md MUST exist.
      If ui-tokens/component.md exists, ui-tokens/semantic.md MUST exist.
  - id: frontmatter-parses
    rule: "Every frontmatter block (between --- markers) MUST be valid YAML."
  - id: data-files-yaml
    rule: "Every file under data/ MUST be valid YAML."
  - id: agent-context-priority-layers-resolve
    rule: |
      If agent-context.md exists, every entry in
      frontmatter.priority_layers MUST name a layer declared in this
      schema's `layers:` block.
  - id: proof-freshness-warn
    severity: warn
    rule: |
      Validators SHOULD warn (not error) if any file under proof/ has
      frontmatter.last_updated older than 180 days. Proof claims decay;
      a stale proof library is a liability in sales conversations.
  - id: design-specs-freshness-warn
    severity: warn
    rule: |
      Validators SHOULD warn if any file under design/ has
      frontmatter.last_updated older than 90 days. Open design questions
      that haven't been revisited in a quarter are likely abandoned.
  - id: sample-status-tolerates-placeholders
    rule: |
      Files with frontmatter.status = sample are template scaffolding,
      not real brand content. Validators MAY skip strict value
      validation (e.g., placeholder slugs, TODO strings, enum-violating
      values) for these files. A real brand repo SHOULD NOT contain any
      file with status = sample once it is live.
  - id: ui-tokens-depends-on-resolves
    rule: |
      Every entry in a ui-tokens file's frontmatter.depends-on array
      MUST name a sibling file under ui-tokens/ that exists.
