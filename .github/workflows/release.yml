# Release workflow — publishes @gramatr/brand-spec-validator to npm on tag push.
#
# Trigger: push a `vX.Y.Z` tag (or run manually via workflow_dispatch).
# Requires: NPM_TOKEN secret in repo settings (granular automation token,
# scoped to @gramatr/brand-spec-validator publish only).
# Provenance: `--provenance` requires GitHub-hosted runner + id-token: write
# (both in place — runs-on: ubuntu-latest, permissions block below).

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:  # manual fallback

permissions:
  contents: read
  id-token: write  # required for npm provenance attestations

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
